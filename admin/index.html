<!DOCTYPE html>
<html lang="en" x-bind:class="darkMode && 'dark'">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title x-text="`${settings.studio_name || 'AM Worx'} � Admin`"></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#6366f1;--accent-hover:#4f46e5;--accent-light:#eef2ff;
  --accent-dark:#818cf8;--accent-subtle:rgba(99,102,241,.08);
  --bg:#f1f5f9;--bg-card:#ffffff;--text:#0f172a;--text-sec:#64748b;
  --text-tert:#94a3b8;--border:#e2e8f0;--hover:#f8fafc;
  --sidebar:#0f0f1a;--sidebar-text:#8b8fa3;--sidebar-hover:rgba(255,255,255,.06);
  --sidebar-active:rgba(99,102,241,.2);--sidebar-active-text:#a5b4fc;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);--radius:8px;--radius-lg:12px;
}
.dark{
  --accent:#818cf8;--accent-hover:#6366f1;--accent-light:#1e1b4b;
  --accent-dark:#a5b4fc;--accent-subtle:rgba(129,140,248,.1);
  --bg:#0b1120;--bg-card:#111827;--text:#f1f5f9;--text-sec:#94a3b8;
  --text-tert:#64748b;--border:#1e293b;--hover:#1a2332;
  --sidebar:#080c17;--sidebar-text:#6b7280;--sidebar-hover:rgba(255,255,255,.05);
  --sidebar-active:rgba(129,140,248,.15);--sidebar-active-text:#a5b4fc;
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 6px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:0 10px 25px rgba(0,0,0,.4);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.sidebar{background:var(--sidebar);color:var(--sidebar-text);width:240px;height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:40;transition:transform .3s cubic-bezier(.4,0,.2,1),background .3s}
.main{flex:1;margin-left:240px;height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:margin .3s cubic-bezier(.4,0,.2,1)}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,border-color .3s;flex-shrink:0;gap:12px}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);transition:background .3s}
/* Sidebar */
.sidebar-brand{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo{width:38px;height:38px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.sidebar-brand-text{font-weight:700;font-size:15px;color:#f1f5f9;line-height:1.2}
.sidebar-brand-sub{font-size:11px;color:var(--sidebar-text);line-height:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:8px;margin:2px 12px;transition:all .15s;font-size:13px;font-weight:500;color:var(--sidebar-text)}
.nav-item:hover{background:var(--sidebar-hover);color:#e2e8f0}
.nav-item.active{background:var(--sidebar-active);color:var(--sidebar-active-text)}
.nav-item i{width:16px;text-align:center;font-size:14px}
/* Stats cards */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:background .3s,border-color .3s,box-shadow .3s;box-shadow:var(--shadow-sm)}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-card .stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.stat-card .stat-value{font-size:28px;font-weight:700;line-height:1.1;color:var(--text);margin-top:12px}
.stat-card .stat-label{font-size:13px;color:var(--text-sec);margin-top:4px}
.stat-card .stat-change{font-size:12px;font-weight:600;margin-top:6px}
/* Table */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:background .3s,border-color .3s;box-shadow:var(--shadow-sm)}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap thead{position:sticky;top:0;z-index:2}
.table-wrap th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);border-bottom:1px solid var(--border);background:var(--bg-card)}
.table-wrap td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border);transition:background .15s;vertical-align:middle}
.table-wrap tr:hover td{background:var(--hover)}
.table-wrap tr:last-child td{border-bottom:none}
.table-clickable{cursor:pointer}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em}
.badge-new{background:var(--accent-light);color:var(--accent)}
.dark .badge-new{background:rgba(129,140,248,.15);color:#a5b4fc}
.badge-reviewed{background:#dcfce7;color:#166534}
.dark .badge-reviewed{background:rgba(34,197,94,.12);color:#4ade80}
.avatar-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626;box-shadow:0 2px 8px rgba(239,68,68,.3)}
.btn-ghost{background:transparent;color:var(--text-sec);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){background:var(--hover);color:var(--text);border-color:var(--text-tert)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
/* Inputs */
.input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg-card);color:var(--text);transition:border-color .15s,background .3s,color .3s,box-shadow .15s;outline:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
select.input{cursor:pointer}
/* Search bar */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-bar .search-input{flex:1;min-width:200px;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg-card);color:var(--text);transition:border-color .15s,background .3s,color .3s,box-shadow .15s;outline:none}
.search-bar .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
.search-bar .search-wrap{position:relative;flex:1;min-width:200px}
.search-bar .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-tert);font-size:13px;pointer-events:none}
.search-bar .search-wrap .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-tert);cursor:pointer;font-size:14px;padding:2px}
.search-bar .search-wrap .search-clear:hover{color:var(--text)}
/* Detail panel */
.detail-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:45;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.detail-backdrop.open{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--bg-card);border-left:1px solid var(--border);z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1),background .3s,border-color .3s;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.12)}
.detail-panel.open{transform:translateX(0)}
/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;max-width:420px;width:90%;transform:scale(.92) translateY(8px);transition:transform .25s cubic-bezier(.4,0,.2,1);border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.modal-overlay.open .modal-box{transform:scale(1) translateY(0)}
/* Toasts */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:slideUp .3s ease-out;max-width:380px;min-width:280px}
.toast-ok{background:#059669;color:#fff}
.toast-error{background:#dc2626;color:#fff}
.toast-info{background:var(--accent);color:#fff}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.spinner-lg{width:32px;height:32px;border-width:3px}
/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--hover) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.skel-row{height:14px;margin-bottom:8px;width:100%}
.skel-row:last-child{width:60%}
.skel-avatar{width:32px;height:32px;border-radius:50%}
.skel-badge{width:60px;height:20px;border-radius:999px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b1120 0%,#1a1040 50%,#0b1120 100%);padding:20px;position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none}
.login-card{background:rgba(17,24,39,.8);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:#fff;box-shadow:0 8px 24px rgba(99,102,241,.3)}
.login-card h1{color:#f1f5f9;font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-card .sub{color:#8b8fa3;text-align:center;font-size:13px;margin-bottom:28px}
.login-card .input{background:rgba(0,0,0,.3);border-color:rgba(255,255,255,.08);color:#f1f5f9;padding:10px 14px}
.login-card .input:focus{border-color:var(--accent-dark);box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.login-card .input::placeholder{color:#6b7280}
.login-card .btn-primary{width:100%;padding:12px;font-size:14px;justify-content:center;border-radius:var(--radius)}
.login-card .error-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;text-align:center}
.login-card .field{margin-bottom:16px}
.login-card .field.mb-24{margin-bottom:24px}
/* Auth loading screen - simpler, no gradient */
.auth-loading{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.login-card label{display:block;font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
/* Stepper (settings) */
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.number-stepper{display:inline-flex;align-items:center;gap:0}
.stepper-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;transition:all .15s;user-select:none;line-height:1}
.stepper-btn:hover{background:var(--hover);border-color:var(--accent);color:var(--accent)}
.stepper-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stepper-btn.stepper-dec{border-radius:6px 0 0 6px}
.stepper-btn.stepper-inc{border-radius:0 6px 6px 0}
.stepper-input{width:44px;height:28px;border:1px solid var(--border);border-left:none;border-right:none;text-align:center;font-size:13px;font-weight:600;background:var(--bg-card);color:var(--text);padding:0 2px;outline:none}
.stepper-input:focus{border-color:var(--accent);z-index:1}
.stepper-input.standalone{width:64px;border:1px solid var(--border);border-radius:6px}
/* Section cards (settings) */
.section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:background .3s,border-color .3s;box-shadow:var(--shadow-sm)}
.section-card .card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:12px}
.section-card .card-header:hover{background:var(--hover)}
.section-card .card-body{padding:16px;border-top:1px solid var(--border)}
.collapse-icon{transition:transform .2s;font-size:11px;color:var(--text-tert)}
.collapse-icon.open{transform:rotate(90deg)}
/* Empty state */
.empty-state{padding:48px 20px;text-align:center;color:var(--text-sec)}
.empty-state i{font-size:40px;margin-bottom:12px;opacity:.3;color:var(--text-tert)}
.empty-state h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-state p{font-size:13px;color:var(--text-sec)}
/* Field labels (detail panel) */
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tert);margin-bottom:3px}
.field-value{font-size:14px;color:var(--text);margin-bottom:12px}
/* Responsive */
@media(max-width:768px){
.sidebar{width:240px;transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.header{padding:10px 16px}
.content{padding:16px}
.stat-row{grid-template-columns:1fr 1fr}
.detail-panel{width:100%}
.search-bar .search-wrap{min-width:100%}
}
@media(max-width:480px){
.stat-row{grid-template-columns:1fr}
}
/* Hamburger */
.hamburger{display:none;background:var(--bg-card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:var(--radius);cursor:pointer;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.hamburger:hover{background:var(--hover);border-color:var(--accent);color:var(--accent)}
@media(max-width:768px){.hamburger{display:inline-flex}}
/* Skeleton table */
.skel-table{margin-bottom:0}
.skel-table td{padding:14px 16px}
/* Filter select */
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg-card);color:var(--text);cursor:pointer;outline:none;transition:border-color .15s}
.filter-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
/* ===== UTILITY CLASSES ===== */
.flex{display:flex}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.flex-1{flex:1}.flex-shrink-0{flex-shrink:0}.items-center{align-items:center}
.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}.justify-center{justify-content:center}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-14{gap:14px}.gap-16{gap:16px}
.text-center{text-align:center}.text-right{text-align:right}
.fw-500{font-weight:500}.fw-600{font-weight:600}.fw-700{font-weight:700}
.text-sm{font-size:12px}.text-base{font-size:13px}.text-md{font-size:14px}.text-lg{font-size:15px}
.text-sec{color:var(--text-sec)}.text-tert{color:var(--text-tert)}.text-accent{color:var(--accent)}
.mb-4{margin-bottom:4px}.mb-6{margin-bottom:6px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.p-12{padding:12px}.p-16{padding:16px}.p-20{padding:20px}
.px-16{padding-left:16px;padding-right:16px}.px-20{padding-left:20px;padding-right:20px}
.py-12{padding-top:12px;padding-bottom:12px}
.w-full{width:100%}.w-auto{width:auto}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.border-bottom{border-bottom:1px solid var(--border)}
.bg-card{background:var(--bg-card)}
.overflow-hidden{overflow:hidden}.overflow-auto{overflow:auto}
.sticky{position:sticky;top:0;z-index:5}
.nowrap{white-space:nowrap}
.pointer{cursor:pointer}
.nav-icon{width:18px;text-align:center;font-size:14px}
/* Header */
.header-title{font-size:18px;font-weight:700;letter-spacing:-.02em}
.new-badge{position:relative;display:inline-flex;align-items:center;gap:4px;background:var(--accent-subtle);color:var(--accent);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600}
/* Stat icons */
.stat-icon-total{background:var(--accent-subtle);color:var(--accent)}
.bg-icon-pending{background:#dbeafe;color:#2563eb}
.bg-icon-reviewed{background:#dcfce7;color:#16a34a}
.bg-icon-revenue{background:#fef3c7;color:#d97706}
.val-pending{color:#2563eb}.val-reviewed{color:#16a34a}.val-revenue{color:#d97706}
/* Error banner */
.error-banner{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;padding:12px 16px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.dark .error-banner{background:#450a0a;border-color:#991b1b;color:#fca5a5}
.error-banner .dismiss{background:none;border:none;cursor:pointer;font-size:18px;color:inherit;flex-shrink:0;line-height:1;padding:0}
/* Table title */
.table-title{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600}
/* Detail panel */
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--bg-card);z-index:5}
.detail-body{flex:1;overflow-y:auto;padding:20px}
.detail-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg-card);flex-shrink:0}
.detail-section{margin-bottom:16px}
.detail-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.detail-name{font-weight:700;font-size:16px}
.detail-sub{font-size:13px;color:var(--text-sec)}
.detail-meta{font-size:12px;color:var(--text-sec)}
.detail-status-btn{border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.detail-estimate{font-size:20px;font-weight:700;color:#f59e0b}
.field-row .field-label{min-width:80px;display:inline-block;color:var(--text-sec)}
.field-row .field-label-wide{min-width:100px;display:inline-block;color:var(--text-sec)}
.field-row .field-label-block{display:block;margin-bottom:2px;color:var(--text-sec)}
/* Modal */
.modal-icon-box{width:32px;height:32px;background:#fef2f2;color:#ef4444;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.modal-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.modal-desc{font-size:14px;color:var(--text-sec);margin-bottom:24px;padding-left:42px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
/* Settings */
.settings-heading{font-size:18px;font-weight:700;margin-bottom:16px}
.settings-subheading{font-size:18px;font-weight:700;margin-bottom:16px;margin-top:32px}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.section-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.section-card.danger{border-color:#fca5a5;margin-bottom:24px}
.section-card.danger .card-header span{color:#ef4444}
/* User area */
.sidebar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sidebar-text)}
.sidebar-text{color:var(--sidebar-text)}
.user-email{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{margin-top:8px;width:100%;justify-content:center;color:#ef4444;border-color:transparent;background:rgba(239,68,68,.1)}
.btn-logout:hover:not(:disabled){background:rgba(239,68,68,.2);color:#ef4444}
/* Width utility for sidebar nav */
.sidebar-section{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
/* Connected indicator */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.conn-dot.on{background:#22c55e}
.conn-dot.off{background:#ef4444}
.conn-status{font-size:12px}
/* Spinner in button */
.spinner-btn{display:inline-block;width:14px;height:14px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff;margin-right:4px;vertical-align:middle}
/* SMTP grid */
.smtp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding-top:12px;border-top:1px solid var(--border)}
.smtp-note{grid-column:1/-1;font-size:12px;color:var(--text-sec);padding:8px 12px;background:var(--bg-card);border-radius:8px}
/* Password field */
.pass-wrap{position:relative}
.pass-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-sec);font-size:14px}
.pass-input{padding-right:36px}
.h-100vh{height:100vh}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
/* Submissions table responsive */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-scroll table{min-width:600px}
/* Header actions flex */
.header-actions{display:flex;align-items:center;gap:10px}
/* Pricing card header text */
.price-header-text{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
.price-icon-box{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.price-label{font-size:13px}
.price-body-scroll{max-height:400px;overflow-y:auto}
/* Toggle switch */
.toggle-wrap{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:.3s}
.toggle-track.on{background:#22c55e!important}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.3s}
.toggle-knob.on{transform:translateX(20px)!important}
/* SMTP text */
.smtp-label{font-weight:600;font-size:14px}
.smtp-hint{font-size:12px;color:var(--text-sec)}
/* Button spinner white */
.spinner-white{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
/* Page wrapper */
.page-wrap{max-width:960px}
.survey-grid{display:grid;gap:12px;margin-bottom:32px}
/* Grid card mb */
.card-mb{margin-bottom:24px}
/* New badge sidebar */
.nav-new-badge{display:inline-flex;align-items:center;justify-content:center;margin-left:auto;background:#ef4444;color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;min-width:20px;text-align:center}
/* Table row clickable */
.row-clickable{cursor:pointer}
.row-clickable:hover td{background:var(--hover)}
/* Email link */
.email-link{color:var(--accent);text-decoration:none}
.email-link:hover{text-decoration:underline}
/* Table actions */
.table-actions{display:flex;gap:4px}
.btn-danger-ghost{color:#ef4444!important}
.toast-dismiss{background:none;border:none;color:inherit;cursor:pointer;font-size:16px;opacity:.7;padding:0;line-height:1}
.toast-dismiss:hover{opacity:1}
.file-link{font-size:13px;display:flex;align-items:center;gap:6px}
.flex-1-min{flex:1;min-width:0}
.section-header-text{font-weight:600;font-size:14px}
.option-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.option-row .input-flex-2{flex:2}.option-row .input-flex-1{flex:1}
.opt-stepper{width:52px}
.textarea-v-resize{resize:vertical}
.flex-checkbox{display:flex;align-items:center;gap:8px;margin-top:4px}
.flex-checkbox span{font-size:13px}
</style>
</head>
<body><div x-data="dashboardApp" x-init="init" class="flex h-100vh">

<!-- LOGIN SCREEN -->
<template x-if="!authenticated && !authLoading">
<div class="login-page" style="position:fixed;inset:0;z-index:200">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-pen-ruler"></i></div>
    <h1>AM Worx Admin</h1>
    <p class="sub">Sign in to manage intake submissions</p>
    <div x-show="loginError" x-transition class="error-msg" x-text="loginError"></div>
    <form @submit.prevent="handleLogin">
      <div class="field"><label>Email</label><input class="input" type="email" x-model="loginEmail" placeholder="admin@example.com" required autocomplete="email"></div>
      <div class="field mb-24"><label>Password</label><input class="input" type="password" x-model="loginPassword" placeholder="Enter your password" required autocomplete="current-password"></div>
      <button class="btn btn-primary" type="submit" :disabled="loginLoading">
        <i class="fas fa-unlock" x-show="!loginLoading"></i>
        <span x-show="loginLoading"><span class="spinner-white"></span></span>
        <span x-text="loginLoading ? 'Signing in...' : 'Unlock Dashboard'"></span>
      </button>
    </form>
  </div>
</div>
</template>

<!-- AUTH LOADING -->
<template x-if="authLoading">
<div class="auth-loading">
  <div class="spinner spinner-lg"></div>
  <p class="text-sec text-md">Checking session...</p>
</div>
</template>

<!-- MAIN APP -->
<template x-if="authenticated">
<div style="display:flex;height:100vh;width:100%">

  <!-- Sidebar -->
  <aside class="sidebar" :class="sidebarOpen && 'open'">
    <div class="sidebar-brand">
      <div class="sidebar-logo"><i class="fas fa-pen-ruler"></i></div>
      <div>
        <div class="sidebar-brand-text" x-text="settings.studio_name || 'AM Worx'"></div>
        <div class="sidebar-brand-sub">Admin Dashboard</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" :class="view === 'dashboard' && 'active'" @click="view='dashboard';sidebarOpen=false">
        <i class="fas fa-chart-pie nav-icon"></i><span>Dashboard</span>
      </div>
      <div class="nav-item" :class="view === 'submissions' && 'active'" @click="view='submissions';sidebarOpen=false">
        <i class="fas fa-inbox nav-icon"></i><span>Submissions</span>
        <span x-show="newCount" class="nav-new-badge" x-text="newCount"></span>
      </div>
      <div class="nav-item" :class="view === 'settings' && 'active'" @click="view='settings';sidebarOpen=false">
        <i class="fas fa-cog nav-icon"></i><span>Settings</span>
      </div>
      <div class="nav-item" @click="openFormUrl">
        <i class="fas fa-external-link-alt nav-icon"></i><span>View Form</span>
      </div>
    </nav>
    <div class="sidebar-section">
      <div class="flex items-center gap-10 mb-12">
        <div class="flex items-center gap-6 conn-status">
          <span class="conn-dot on" x-show="connected"></span>
          <span class="conn-dot off" x-show="!connected"></span>
          <span x-text="connected ? 'Connected' : 'Disconnected'" class="sidebar-text"></span>
        </div>
      </div>
      <div class="sidebar-user">
        <i class="fas fa-user-circle"></i>
        <span class="user-email" x-text="user?.email"></span>
      </div>
      <button class="btn btn-ghost btn-sm btn-logout" @click="handleLogout">
        <i class="fas fa-sign-out-alt"></i> Log Out
      </button>
    </div>
    </aside>

    <!-- Sidebar backdrop for mobile -->
    <div class="detail-backdrop" :class="sidebarOpen && 'open'" @click="sidebarOpen=false"></div>

    <!-- Main Content Area -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <div class="flex items-center gap-10">
        <button class="hamburger" @click="sidebarOpen=!sidebarOpen"><i class="fas fa-bars"></i></button>
        <h2 class="header-title" x-text="pageTitle"></h2>
      </div>
      <div class="flex items-center gap-10">
        <span x-show="newCount" class="new-badge pulse">
          <i class="fas fa-bell"></i> <span x-text="newCount"></span> new
        </span>
        <button class="btn btn-ghost btn-sm" @click="toggleDark" title="Toggle dark mode">
          <i class="fas fa-moon" x-show="!darkMode"></i>
          <i class="fas fa-sun" x-show="darkMode"></i>
        </button>
        <button class="btn btn-ghost btn-sm" @click="refresh" title="Refresh data" :disabled="loading">
          <i class="fas fa-sync-alt" :class="loading && 'fa-spin'"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- DASHBOARD VIEW -->
      <template x-if="view === 'dashboard'">
      <div>
        <div x-show="error" x-transition class="error-banner">
          <i class="fas fa-exclamation-triangle"></i>
          <span class="flex-1" x-text="error"></span>
          <button class="dismiss" @click="error=''">&times;</button>
        </div>
        <template x-if="loading && submissions.length === 0">
        <div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
            <template x-for="i in 4">
            <div class="stat-card"><div class="skeleton" style="width:60%;height:14px;margin-bottom:12px"></div><div class="skeleton" style="width:40%;height:28px;margin-bottom:8px"></div><div class="skeleton" style="width:80%;height:12px"></div></div>
            </template>
          </div>
        <div class="table-wrap" style="padding:20px">
            <template x-for="i in 5">
            <div class="flex gap-16" style="padding:10px 0;border-bottom:1px solid var(--border)">
              <div class="skeleton" style="width:32px;height:32px;border-radius:50%"></div>
              <div style="flex:1"><div class="skeleton" style="width:40%;height:14px;margin-bottom:6px"></div><div class="skeleton" style="width:25%;height:12px"></div></div>
              <div><div class="skeleton" style="width:60px;height:14px"></div></div>
              <div><div class="skeleton" style="width:70px;height:14px"></div></div>
              <div><div class="skeleton" style="width:60px;height:14px"></div></div>
            </div>
            </template>
          </div>
        </div>
        </template>
        <template x-if="!loading || submissions.length > 0">
        <div>
          <div class="stat-row">
            <div class="stat-card">
              <div class="stat-icon stat-icon-total"><i class="fas fa-file-alt"></i></div>
              <div class="stat-value" x-text="submissions.length"></div>
              <div class="stat-label">Total submissions</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon bg-icon-pending"><i class="fas fa-clock"></i></div>
              <div class="stat-value val-pending" x-text="submissions.filter(s=>s.status==='New').length"></div>
              <div class="stat-label">Awaiting review</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon bg-icon-reviewed"><i class="fas fa-check-circle"></i></div>
              <div class="stat-value val-reviewed" x-text="submissions.filter(s=>s.status==='Reviewed').length"></div>
              <div class="stat-label">Reviewed</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon bg-icon-revenue"><i class="fas fa-dollar-sign"></i></div>
              <div class="stat-value val-revenue" x-text="formatCurrency(submissions.reduce((sum,s)=>sum+(parseFloat(s.estimated_total)||0),0))"></div>
              <div class="stat-label">Combined estimate (client-side)</div>
            </div>
          </div>
          <div class="table-wrap table-scroll">
            <div class="table-title">Recent Submissions</div>
            <template x-if="submissions.length === 0">
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <h3>No submissions yet</h3>
              <p>When clients submit the intake form, their submissions will appear here.</p>
            </div>
            </template>
            <template x-if="submissions.length > 0">
            <table>
              <thead><tr><th>Name</th><th>Business</th><th>Date</th><th>Estimate</th><th>Status</th></tr></thead>
              <tbody>
                <template x-for="s in submissions.slice(0,5)" :key="s.id">
                <tr class="striped row-clickable" @click="openDetail(s)">
                  <td>
                    <div class="flex items-center gap-10">
                      <div class="avatar-circle" :style="`background:${avatarColor(s.full_name)}`" x-text="getInitials(s.full_name)"></div>
                      <span x-text="s.full_name"></span>
                    </div>
                  </td>
                  <td x-text="s.business_name || '—'"></td>
                  <td x-text="formatDate(s.created_at, settings.date_style)"></td>
                  <td x-text="formatCurrency(s.estimated_total)"></td>
                  <td><span class="badge" :class="s.status === 'New' ? 'badge-new' : 'badge-reviewed'"><span x-show="s.status === 'New'" class="pulse" style="width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--accent)"></span><span x-text="s.status"></span></span></td>
                </tr>
                </template>
              </tbody>
            </table>
            </template>
          </div>
          <div class="mt-16 text-right">
            <button class="btn btn-ghost btn-sm" @click="view='submissions'">View all submissions <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>
        </template>
      </div>
      </template>

      <!-- SUBMISSIONS VIEW -->
      <template x-if="view === 'submissions'">
      <div>
        <div class="search-bar">
          <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input class="search-input" type="text" x-model="search" placeholder="Search by name, business, or email...">
            <button class="search-clear" x-show="search" @click="search=''">&times;</button>
          </div>
          <span class="text-base text-sec nowrap"><span x-text="filteredSubmissions.length"></span> of <span x-text="submissions.length"></span></span>
        </div>
        <div class="table-wrap table-scroll">
          <template x-if="filteredSubmissions.length === 0">
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <h3 x-text="submissions.length === 0 ? 'No submissions yet' : 'No results found'"></h3>
            <p x-text="submissions.length === 0 ? 'When clients submit the intake form, their submissions will appear here.' : 'Try adjusting your search query.'"></p>
          </div>
          </template>
          <template x-if="filteredSubmissions.length > 0">
          <table>
            <thead><tr><th>Name</th><th>Business</th><th>Email</th><th>Date</th><th>Estimate</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              <template x-for="s in filteredSubmissions" :key="s.id">
              <tr class="striped row-clickable" @click="openDetail(s)">
                <td>
                  <div class="flex items-center gap-10">
                    <div class="avatar-circle" :style="`background:${avatarColor(s.full_name)}`" x-text="getInitials(s.full_name)"></div>
                    <span x-text="s.full_name"></span>
                  </div>
                </td>
                <td x-text="s.business_name || '—'"></td>
                <td><a :href="'mailto:'+s.client_email" @click.stop class="email-link" x-text="s.client_email"></a></td>
                <td x-text="formatDate(s.created_at, settings.date_style)" class="nowrap"></td>
                <td x-text="formatCurrency(s.estimated_total)" class="fw-600"></td>
                <td><span class="badge" :class="s.status === 'New' ? 'badge-new' : 'badge-reviewed'"><span x-show="s.status === 'New'" class="pulse" style="width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--accent)"></span><span x-text="s.status"></span></span></td>
                <td>
                  <div class="table-actions" @click.stop>
                    <button class="btn btn-ghost btn-sm" @click="openDetail(s)" title="View"><i class="fas fa-eye"></i></button>
                    <button class="btn btn-ghost btn-sm" @click="toggleStatus(s)" title="Toggle status"><i class="fas fa-exchange-alt" :class="s._loading && 'fa-spin'"></i></button>
                    <button class="btn btn-ghost btn-sm btn-danger-ghost" @click="confirmDelete(s)" title="Delete"><i class="fas fa-trash-alt"></i></button>
                  </div>
                </td>
              </tr>
              </template>
            </tbody>
          </table>
          </template>
        </div>
      </div>
      </template>

      <!-- SETTINGS VIEW -->
      <template x-if="view === 'settings'">
      <div class="page-wrap">

        <div x-show="settingsError" x-transition class="error-banner">
          <i class="fas fa-exclamation-triangle"></i>
          <span class="flex-1" x-text="settingsError"></span>
          <button class="dismiss" @click="settingsError=''">&times;</button>
        </div>

        <h3 class="settings-heading">General Settings</h3>
        <div class="section-card card-mb">
          <div class="card-body">
            <div class="settings-grid">
              <div><label class="field-label">Studio Name</label><input class="input" type="text" x-model="settingsForm.studio_name"></div>
              <div><label class="field-label">Studio Email</label><input class="input" type="email" x-model="settingsForm.studio_email"></div>
              <div><label class="field-label">Form URL</label><input class="input" type="url" x-model="settingsForm.form_url" placeholder="https://..."></div>
              <div><label class="field-label">Auto-refresh (seconds)</label>
                <div class="number-stepper"><button class="stepper-btn stepper-dec" @click="nudge('auto_refresh_sec',-10,10,3600)">−</button><input class="stepper-input" type="number" x-model="settingsForm.auto_refresh_sec" min="10" max="3600" step="10"><button class="stepper-btn stepper-inc" @click="nudge('auto_refresh_sec',10,10,3600)">+</button></div>
              </div>
              <div><label class="field-label">Toast Duration (ms)</label>
                <div class="number-stepper"><button class="stepper-btn stepper-dec" @click="nudge('toast_duration_ms',-100,500,10000)">−</button><input class="stepper-input" type="number" x-model="settingsForm.toast_duration_ms" min="500" max="10000" step="100"><button class="stepper-btn stepper-inc" @click="nudge('toast_duration_ms',100,500,10000)">+</button></div>
              </div>
              <div><label class="field-label">Session Expiry (hours)</label>
                <div class="number-stepper"><button class="stepper-btn stepper-dec" @click="nudge('session_expiry_hours',-1,1,720)">−</button><input class="stepper-input" type="number" x-model="settingsForm.session_expiry_hours" min="1" max="720" step="1"><button class="stepper-btn stepper-inc" @click="nudge('session_expiry_hours',1,1,720)">+</button></div>
              </div>
              <div><label class="field-label">Date Format</label>
                <select class="input" x-model="settingsForm.date_style"><option value="short">Short (MM/DD/YYYY)</option><option value="medium">Medium (MMM DD, YYYY)</option><option value="long">Long (Month DD, YYYY)</option></select>
              </div>
            </div>
          </div>
        </div>

        <h3 class="settings-subheading">Email Notifications <span class="badge" style="background:#e2e8f0;color:#64748b;font-weight:500">Optional</span></h3>
        <div class="section-card card-mb">
          <div class="card-body">
            <div class="flex items-center gap-12 mb-16">
              <label class="toggle-wrap">
                <input type="checkbox" x-model="settingsForm.smtp_enabled">
                <span class="toggle-track" :class="settingsForm.smtp_enabled && 'on'">
                  <span class="toggle-knob" :class="settingsForm.smtp_enabled && 'on'"></span>
                </span>
              </label>
              <div>
                <div class="smtp-label">Gmail SMTP Notifications</div>
                <div class="smtp-hint">Receive email when a new intake submission arrives</div>
              </div>
            </div>
            <template x-if="settingsForm.smtp_enabled">
            <div class="smtp-grid">
              <div><label class="field-label">SMTP Email</label><input class="input" type="email" x-model="settingsForm.smtp_email" placeholder="amworxx@gmail.com"></div>
              <div><label class="field-label">SMTP Password <span class="text-sm text-sec">(Gmail App Password)</span></label>
                <div class="pass-wrap">
                  <input class="input pass-input" :type="smtpPassVisible ? 'text' : 'password'" x-model="settingsForm.smtp_password" placeholder="16-char app password">
                  <button @click="smtpPassVisible=!smtpPassVisible" type="button" class="pass-toggle">
                    <i :class="smtpPassVisible ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                  </button>
                </div>
              </div>
              <div class="smtp-note">
                <i class="fas fa-info-circle mr-2"></i>
                To send emails you need a Gmail App Password:
                Enable <strong>2FA</strong> on your Gmail account → 
                <strong>Google Account → Security → App Passwords</strong> → generate for "Mail" →
                paste the 16-character password above.
              </div>
            </div>
            </template>
          </div>
        </div>

        <h3 class="settings-heading">Pricing Management</h3>
        <div class="pricing-grid">

          <div class="section-card">
            <div class="card-header" @click="pricingCollapsed.domain=!pricingCollapsed.domain">
              <span class="price-header-text"><span class="price-icon-box" style="background:var(--accent-subtle);color:var(--accent)"><i class="fas fa-globe"></i></span>Domain</span>
              <i class="fas fa-chevron-right collapse-icon" :class="!pricingCollapsed.domain && 'open'"></i>

<script>
const SUPABASE_URL = 'https://jyqjkkcenuapssmstmze.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cWpra2NlbnVhcHNzbXN0bXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODk4ODMsImV4cCI6MjA5OTk2NTg4M30.tuPesgd2yCsize4z3jdLAWbxmbQQ_Sv8ChV6lNISaFg';
const APP_NAME = 'AM Worx Intake';
const FORM_URL = 'https://amworx.github.io/client-intake/';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

document.addEventListener('alpine:init', () => {
  Alpine.data('dashboardApp', () => ({
    // Auth
    authenticated: false,
    authLoading: true,
    loginEmail: '',
    loginPassword: '',
    loginError: '',
    loginLoading: false,
    user: null,

    // App state
    view: 'dashboard',
    submissions: [],
    settings: {},
    settingsForm: {
      studio_name: 'AM Worx',
      studio_email: 'amworxx@gmail.com',
      form_url: 'https://amworx.github.io/client-intake/',
      auto_refresh_sec: 60,
      toast_duration_ms: 3000,
      session_expiry_hours: 24,
      date_style: 'medium',
      smtp_enabled: false,
      smtp_email: 'amworxx@gmail.com',
      smtp_password: '',
      PRICES: {},
      SECTIONS: {}
    },
    smtpPassVisible: false,
    search: '',
    loading: true,
    error: '',
    settingsError: '',
    darkMode: localStorage.getItem('admin_darkMode') === 'true',
    connected: true,
    sidebarOpen: false,

    // Detail panel
    detailOpen: false,
    detailSubmission: null,

    // Delete modal
    deleteModalOpen: false,
    deleteTarget: null,
    deleteLoading: false,

    // Reset modal
    resetModalOpen: false,
    resetting: false,

    // Saving state
    saving: false,

    // Toasts
    toasts: [],
    toastCounter: 0,

    // Collapse states
    pricingCollapsed: { domain: true, hosting: true, email: true, setup: true, websiteType: true, pages: true, features: true, logo: true, textContent: true, photos: true, timeline: true, maintenance: true },
    sectionCollapsed: { contact: true, domain_hosting: true, website: true, branding: true, timeline_section: true, maintenance_budget: true, review: true },

    // Realtime
    realtimeChannel: null,
    refreshInterval: null,

    sectionGroups: {},

    async init() {
      const savedDark = localStorage.getItem('admin_darkMode');
      if (savedDark === 'true') this.darkMode = true;

      // Load section groups
      try {
        const { data: sg } = await supabaseClient.from('section_groups').select('*');
        if (sg) sg.forEach(g => { this.sectionGroups[g.section_key] = g.groups || []; });
      } catch (e) {}

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        this.authenticated = true;
        this.user = session.user;
        this.authLoading = false;
        this.$nextTick(() => this.loadData());
      } else {
        this.authLoading = false;
      }

      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
          this.authenticated = true;
          this.user = session.user;
          if (event === 'SIGNED_IN') this.$nextTick(() => this.loadData());
        } else {
          this.authenticated = false;
          this.user = null;
        }
      });
    },

    async loadData() {
      await Promise.all([this.loadSubmissions(), this.loadSettings()]);
      this.setupRealtime();
      this.startAutoRefresh();
    },

    async loadSubmissions() {
      this.loading = true;
      this.error = '';
      try {
        const { data, error } = await supabaseClient
          .from('submissions').select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        this.submissions = data || [];
        this.connected = true;
      } catch (e) {
        this.error = 'Failed to load submissions: ' + e.message;
        this.connected = false;
      } finally {
        this.loading = false;
      }
    },

    async loadSettings() {
      try {
        const { data, error } = await supabaseClient
          .from('settings').select('*').eq('id', 1).single();
        if (error) throw error;
        if (data) {
          this.settings = data;
          const secs = data.sections || {};
          ['contact','domain_hosting','website','branding','timeline','maintenance_budget','review'].forEach(k => {
            if (!secs[k]) secs[k] = { title: '', desc: '', show: true, options: [] };
            if (secs[k].options === undefined) secs[k].options = [];
          });
          this.settingsForm = {
            studio_name: data.studio_name || 'AM Worx',
            studio_email: data.studio_email || 'amworxx@gmail.com',
            form_url: data.form_url || '',
            auto_refresh_sec: data.auto_refresh_sec || 60,
            toast_duration_ms: data.toast_duration_ms || 3000,
            session_expiry_hours: data.session_expiry_hours || 24,
            date_style: data.date_style || 'medium',
            smtp_enabled: data.smtp_enabled || false,
            smtp_email: data.smtp_email || 'amworxx@gmail.com',
            smtp_password: data.smtp_password || '',
            PRICES: JSON.parse(JSON.stringify(data.prices || {})),
            SECTIONS: secs
          };
        }
      } catch (e) {
        this.settingsError = 'Failed to load settings: ' + e.message;
      }
    },

    sectionGroupsFor(key) {
      const map = { contact: 'domain', domain_hosting: 'hosting', website: 'website',
        branding: 'branding', timeline: 'timeline', maintenance_budget: 'maintenance', review: 'maintenance' };
      return this.sectionGroups[map[key] || key] || [];
    },

    setupRealtime() {
      if (this.realtimeChannel) supabaseClient.removeChannel(this.realtimeChannel);
      this.realtimeChannel = supabaseClient
        .channel('submissions')
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'submissions' },
          (payload) => {
            if (!this.submissions.find(s => s.id === payload.new.id)) {
              this.submissions.unshift(payload.new);
              this.showToast('New submission: ' + payload.new.full_name, 'ok');
            }
          })
        .subscribe((status) => { this.connected = status === 'SUBSCRIBED'; });
    },

    startAutoRefresh() {
      if (this.refreshInterval) clearInterval(this.refreshInterval);
      const sec = this.settingsForm.auto_refresh_sec || 60;
      this.refreshInterval = setInterval(() => this.refreshSilently(), sec * 1000);
    },

    async refreshSilently() {
      try {
        const { data } = await supabaseClient
          .from('submissions').select('*')
          .order('created_at', { ascending: false });
        if (data) this.submissions = data;
      } catch (e) {}
    },

    async refresh() {
      this.settingsError = '';
      this.error = '';
      this.loading = true;
      await this.loadSubmissions();
      await this.loadSettings();
      this.loading = false;
      this.showToast('Data refreshed', 'info');
    },

    async handleLogin() {
      if (!this.loginEmail || !this.loginPassword) {
        this.loginError = 'Please enter email and password';
        return;
      }
      this.loginError = '';
      this.loginLoading = true;
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: this.loginEmail, password: this.loginPassword
        });
        if (error) {
          this.loginError = error.message === 'Invalid login credentials'
            ? 'Invalid email or password' : error.message;
          return;
        }
        if (data.session) {
          this.authenticated = true;
          this.user = data.user;
          this.loginEmail = '';
          this.loginPassword = '';
          this.$nextTick(() => this.loadData());
        }
      } catch (e) {
        this.loginError = 'Connection error. Please try again.';
      } finally {
        this.loginLoading = false;
      }
    },

    async handleLogout() {
      await supabaseClient.auth.signOut();
      this.authenticated = false;
      this.user = null;
      this.submissions = [];
      this.detailOpen = false;
      this.detailSubmission = null;
      if (this.realtimeChannel) supabaseClient.removeChannel(this.realtimeChannel);
      if (this.refreshInterval) clearInterval(this.refreshInterval);
    },

    toggleDark() {
      this.darkMode = !this.darkMode;
      localStorage.setItem('admin_darkMode', this.darkMode);
    },

    get pageTitle() {
      return { dashboard: 'Dashboard', submissions: 'Submissions', settings: 'Settings' }[this.view] || 'Dashboard';
    },

    get newCount() {
      return this.submissions.filter(s => s.status === 'New').length;
    },

    get filteredSubmissions() {
      if (!this.search) return this.submissions;
      const q = this.search.toLowerCase();
      return this.submissions.filter(s =>
        (s.full_name && s.full_name.toLowerCase().includes(q)) ||
        (s.business_name && s.business_name.toLowerCase().includes(q)) ||
        (s.client_email && s.client_email.toLowerCase().includes(q))
      );
    },

    openFormUrl() {
      const url = this.settings.form_url || FORM_URL;
      if (url) window.open(url, '_blank');
      else this.showToast('Form URL not configured', 'error');
    },

    openDetail(s) {
      this.detailSubmission = s;
      this.detailOpen = true;
    },

    closeDetail() {
      this.detailOpen = false;
      this.$nextTick(() => { this.detailSubmission = null; });
    },

    async toggleStatus(s) {
      if (s._loading) return;
      s._loading = true;
      const newStatus = s.status === 'New' ? 'Reviewed' : 'New';
      try {
        const { error } = await supabaseClient
          .from('submissions').update({ status: newStatus }).eq('id', s.id);
        if (error) throw error;
        s.status = newStatus;
        this.showToast('Marked as ' + newStatus, 'ok');
      } catch (e) {
        this.showToast('Failed to update: ' + e.message, 'error');
      } finally {
        s._loading = false;
      }
    },

    confirmDelete(s) {
      this.deleteTarget = s;
      this.deleteModalOpen = true;
    },

    async doDelete() {
      if (!this.deleteTarget) return;
      this.deleteLoading = true;
      try {
        const { error } = await supabaseClient
          .from('submissions').delete().eq('id', this.deleteTarget.id);
        if (error) throw error;
        this.submissions = this.submissions.filter(s => s.id !== this.deleteTarget.id);
        if (this.detailSubmission && this.detailSubmission.id === this.deleteTarget.id) this.closeDetail();
        this.showToast('Submission deleted', 'ok');
      } catch (e) {
        this.showToast('Failed to delete: ' + e.message, 'error');
      } finally {
        this.deleteLoading = false;
        this.deleteModalOpen = false;
        this.deleteTarget = null;
      }
    },

    nudge(field, delta, min, max) {
      let v = Number(this.settingsForm[field]) || 0;
      v = Math.max(min, Math.min(max, v + delta));
      this.settingsForm[field] = v;
    },

    adjPrice(key, delta) {
      if (!this.settingsForm.PRICES) this.settingsForm.PRICES = {};
      let v = Number(this.settingsForm.PRICES[key]) || 0;
      v = Math.max(0, v + delta);
      this.settingsForm.PRICES[key] = v;
    },

    adjOptPrice(opt, delta) {
      let v = Number(opt.price) || 0;
      opt.price = Math.max(0, v + delta);
    },

    addOption(sectionKey) {
      if (!this.settingsForm.SECTIONS[sectionKey].options) {
        this.settingsForm.SECTIONS[sectionKey].options = [];
      }
      this.settingsForm.SECTIONS[sectionKey].options.push({ label: '', value: '', group: '', price: 0 });
    },

    rmOption(sectionKey, idx) {
      this.settingsForm.SECTIONS[sectionKey].options.splice(idx, 1);
    },

    async saveSettings() {
      this.saving = true;
      this.settingsError = '';
      try {
        const { error } = await supabaseClient
          .from('settings').update({
            studio_name: this.settingsForm.studio_name,
            studio_email: this.settingsForm.studio_email,
            form_url: this.settingsForm.form_url,
            auto_refresh_sec: this.settingsForm.auto_refresh_sec,
            toast_duration_ms: this.settingsForm.toast_duration_ms,
            session_expiry_hours: this.settingsForm.session_expiry_hours,
            date_style: this.settingsForm.date_style,
            smtp_enabled: this.settingsForm.smtp_enabled,
            smtp_email: this.settingsForm.smtp_email,
            smtp_password: this.settingsForm.smtp_password,
            prices: this.settingsForm.PRICES,
            sections: this.settingsForm.SECTIONS
          }).eq('id', 1);
        if (error) throw error;
        this.settings = { ...this.settings, ...this.settingsForm };
        this.showToast('Settings saved', 'ok');
        this.startAutoRefresh();
      } catch (e) {
        this.settingsError = 'Failed to save: ' + e.message;
        this.showToast('Failed to save settings', 'error');
      } finally {
        this.saving = false;
      }
    },

    async doResetDefaults() {
      this.resetting = true;
      try {
        const { error } = await supabaseClient
          .from('settings').update({ prices: {}, sections: {} }).eq('id', 1);
        if (error) throw error;
        this.settingsForm.PRICES = {};
        this.settingsForm.SECTIONS = {};
        ['contact','domain_hosting','website','branding','timeline','maintenance_budget','review'].forEach(k => {
          this.settingsForm.SECTIONS[k] = { title: '', desc: '', show: true, options: [] };
        });
        this.showToast('Settings reset to defaults', 'ok');
      } catch (e) {
        this.showToast('Failed to reset: ' + e.message, 'error');
      } finally {
        this.resetting = false;
        this.resetModalOpen = false;
      }
    },

    showToast(message, type) {
      type = type || 'info';
      const t = { message, type, hover: false };
      this.toasts.push(t);
      const dur = this.settingsForm.toast_duration_ms || 3000;
      setTimeout(() => {
        if (!t.hover) {
          this.toasts = this.toasts.filter(x => x !== t);
        } else {
          const check = setInterval(() => {
            if (!t.hover) {
              this.toasts = this.toasts.filter(x => x !== t);
              clearInterval(check);
            }
          }, 500);
        }
      }, dur);
    },

    dismissToast(idx) {
      this.toasts.splice(idx, 1);
    },

    formatDate(dateStr, style) {
      if (!dateStr) return '�';
      try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '�';
        const opts = { short: { month: 'numeric', day: 'numeric', year: '2-digit' },
          medium: { month: 'short', day: 'numeric', year: 'numeric' },
          long: { month: 'long', day: 'numeric', year: 'numeric' } };
        return d.toLocaleDateString('en-US', opts[style] || opts.medium);
      } catch (e) { return '�'; }
    },

    formatCurrency(amount) {
      const n = parseFloat(amount) || 0;
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    },

    getInitials(name) {
      if (!name) return '?';
      return name.trim().charAt(0).toUpperCase();
    },

    avatarColor(name) {
      const colors = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];
      let hash = 0;
      if (name) for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }
  }));
});

  Alpine.magic('steppers', () => function() {});

// Global click handler for number steppers
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.stepper-btn');
  if (!btn) return;
  const container = btn.closest('.number-stepper');
  if (!container) return;
  const input = container.querySelector('.stepper-input');
  if (!input) return;
  const min = parseFloat(input.getAttribute('min')) || 0;
  const max = input.getAttribute('max') !== null ? parseFloat(input.getAttribute('max')) : Infinity;
  const step = parseFloat(input.getAttribute('step')) || 1;
  let val = parseFloat(input.value) || 0;
  if (btn.classList.contains('stepper-inc')) val = Math.min(max, val + step);
  else val = Math.max(min, val - step);
  input.value = val;
  input.dispatchEvent(new Event('input', { bubbles: true }));
});
</script>
</body>
</html>
